name: lms
description: A new Flutter project

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI and Utils
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.3
  pin_code_fields: ^8.0.1

  # Navigation
  go_router: ^17.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # SQLite Database
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icons.png
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: assets/icon/icons.png